<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset='utf-8'>
    <title>Formulário Simples</title>
</head>
<body>
    <h1>Formulário Simples para Exemplo</h1>

    <form method="post" action="dadosRecebidos.php">
        <label>Nome: </label>
        <input type="text" name="nome" placeholder="Digite seu nome" required>
        <br>
        <br>
        <label>E-mail: </label>
        <input type="email" name="email" placeholder="Digite seu e-mail" required>
        <br>
        <br>
        <label>Curso: </label>
        <input type="text" name="curso" placeholder="Digite seu curso" required>
        <br>
        <br>
        <label>Depoimento: </label>
        <textarea name="depoimento"></textarea>
        <br>
        <br>
        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>
    </form>

</body>
</html>
